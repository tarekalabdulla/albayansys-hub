# /etc/nginx/sites-available/hulul-api
# reverse proxy لـ api.hulul-albayan.com → Node على :4000

server {
    listen 80;
    listen [::]:80;
    server_name api.hulul-albayan.com;

    # سيستبدله certbot تلقائياً بـ HTTPS
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Socket.io يحتاج upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # حد رفع 100MB لاستيعاب ملفات mp3 الطويلة
    client_max_body_size 100M;
}
