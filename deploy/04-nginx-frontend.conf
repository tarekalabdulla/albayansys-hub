# Nginx config للفرونت — hulul-albayan.com و www.hulul-albayan.com
# انسخه إلى: /etc/nginx/sites-available/hulul-frontend
# ثم فعّله: ln -sf /etc/nginx/sites-available/hulul-frontend /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name hulul-albayan.com www.hulul-albayan.com;

    root /var/www/hulul-frontend;
    index index.html;

    # ضغط
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # كاش طويل للأصول الثابتة
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif|mp3|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback — أي مسار غير موجود يرجع index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # رؤوس أمان
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;
    access_log /var/log/nginx/hulul-frontend-access.log;
    error_log /var/log/nginx/hulul-frontend-error.log warn;
}
